name: Update Forks
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  determine-runner:
    name: Determine runner (self-hosted or fallback)
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine which runner to use
        id: set-runner
        uses: mikehardy/runner-fallback-action@v1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.METRICS_TOKEN }}

  update-forks:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare fork report
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          bash .github/scripts/render_header.sh

      - name: Process forks
        id: process-forks
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SKIP_REPOS: ${{ vars.SKIP_REPOS }}
        run: |
          bash .github/scripts/update-forks-report.sh

      - name: Finalize fork report
        env:
          TOTAL: ${{ steps.process-forks.outputs.total_count }}
          UPDATED: ${{ steps.process-forks.outputs.updated_count }}
          SKIPPED: ${{ steps.process-forks.outputs.skipped_count }}
          NO_CHANGES: ${{ steps.process-forks.outputs.no_changes_count }}
          FAILED: ${{ steps.process-forks.outputs.failed_count }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          bash .github/scripts/render_footer.sh

      - name: Send email notification (SMTP)
        if: always()
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.SMTP_USERNAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || secrets.SMTP_USERNAME }}
        run: |
          echo "## 📧 Email" >> $GITHUB_STEP_SUMMARY

          if [ ! -f /tmp/email_report.html ]; then
            echo "⚠️ Email report was not generated; skipping email notification."
            echo "⚠️ Email skipped: report file was not generated." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
        
          if [ -z "$SMTP_USERNAME" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "⚠️ SMTP credentials not configured. Skipping email notification."
            echo "To enable email notifications, set the following secrets:"
            echo "  - SMTP_USERNAME (required)"
            echo "  - SMTP_PASSWORD (required)"
            echo "  - SMTP_HOST (optional, defaults to smtp.gmail.com)"
            echo "  - SMTP_PORT (optional, defaults to 587)"
            echo "  - EMAIL_FROM (optional, defaults to SMTP_USERNAME)"
            echo "  - EMAIL_TO (optional, defaults to SMTP_USERNAME)"
            echo "⚠️ Email skipped: SMTP credentials (SMTP_USERNAME / SMTP_PASSWORD) not configured." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          # Use the Python standard-library email sender (no extra packages required)
          python3 .github/scripts/send_email.py
          py_exit=$?
          if [ $py_exit -eq 0 ]; then
            echo "✅ Email notification sent successfully."
            echo "✅ Email notification sent successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Email notification failed (python exit $py_exit). Check SMTP settings and runner egress rules."
            echo "⚠️ Email notification failed. Check SMTP_HOST/SMTP_PORT and runner egress rules." >> $GITHUB_STEP_SUMMARY
          fi
