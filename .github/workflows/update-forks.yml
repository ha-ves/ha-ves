name: Update Forks
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  determine-runner:
    name: Determine runner (self-hosted or fallback)
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine which runner to use
        id: set-runner
        uses: mikehardy/runner-fallback-action@v1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.METRICS_TOKEN }}

  update-forks:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gather forks
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          bash .github/scripts/gather_forks.sh

      - name: Prepare fork report
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          bash .github/scripts/render_header.sh

      - name: Process forks
        id: process-forks
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SKIP_REPOS: ${{ vars.SKIP_REPOS }}
        run: |
          bash .github/scripts/update-forks-report.sh

      - name: Finalize fork report
        env:
          TOTAL: ${{ steps.process-forks.outputs.total_count }}
          UPDATED: ${{ steps.process-forks.outputs.updated_count }}
          SKIPPED: ${{ steps.process-forks.outputs.skipped_count }}
          NO_CHANGES: ${{ steps.process-forks.outputs.no_changes_count }}
          FAILED: ${{ steps.process-forks.outputs.failed_count }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          bash .github/scripts/render_footer.sh

      - name: Send email notification (SMTP / OAuth)
        if: always()
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.SMTP_USERNAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || secrets.SMTP_USERNAME }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_USER_EMAIL: ${{ secrets.OAUTH_USER_EMAIL }}
          OAUTH_TOKEN_URL: ${{ secrets.OAUTH_TOKEN_URL }}
        run: |
          # If OAuth creds are set, install only the google-auth deps we need
          if [ -n "${OAUTH_CLIENT_ID:-}" ] && [ -n "${OAUTH_CLIENT_SECRET:-}" ] && [ -n "${OAUTH_REFRESH_TOKEN:-}" ]; then
            python -m pip install --upgrade pip
            pip install google-auth
          fi
          bash .github/scripts/send_email_notification.sh
